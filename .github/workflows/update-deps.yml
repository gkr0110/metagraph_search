name: Check conda-forge dependencies for updates

on:
  schedule:
    - cron: '0 8 1 * *'   # First day of every month at 08:00 UTC
  workflow_dispatch:        # Allow manual trigger from GitHub Actions UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch latest requests version from conda-forge
        id: latest
        run: |
          VERSION=$(curl -sf "https://api.anaconda.org/package/conda-forge/requests" \
            | python3 -c "import sys, json; print(json.load(sys.stdin)['latest_version'])")
          echo "requests=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Latest requests: $VERSION"

      - name: Read current versions from metagraph_search.xml
        id: current
        run: |
          REQUESTS=$(grep -oP '(?<=<requirement type="package" version=")[^"]+(?=">requests)' metagraph_search.xml)
          echo "requests=$REQUESTS" >> "$GITHUB_OUTPUT"
          echo "Current requests: $REQUESTS"

      - name: Compare versions
        id: diff
        run: |
          if [ "${{ steps.latest.outputs.requests }}" != "${{ steps.current.outputs.requests }}" ]; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
            echo "Update available: requests ${{ steps.current.outputs.requests }} → ${{ steps.latest.outputs.requests }}"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
            echo "Already up to date, nothing to do."
          fi

      - name: Bump version in metagraph_search.xml
        if: steps.diff.outputs.needed == 'true'
        env:
          OLD_REQUESTS: ${{ steps.current.outputs.requests }}
          NEW_REQUESTS: ${{ steps.latest.outputs.requests }}
        run: |
          python3 - <<'EOF'
          import os

          old = os.environ["OLD_REQUESTS"]
          new = os.environ["NEW_REQUESTS"]

          with open("metagraph_search.xml") as f:
              content = f.read()

          content = content.replace(
              f'<requirement type="package" version="{old}">requests</requirement>',
              f'<requirement type="package" version="{new}">requests</requirement>',
          )

          with open("metagraph_search.xml", "w") as f:
              f.write(content)

          print(f"Updated requests: {old} → {new}")
          EOF

      - name: Install planemo and new requests version
        if: steps.diff.outputs.needed == 'true'
        run: |
          pip install planemo requests==${{ steps.latest.outputs.requests }}

      - name: Run planemo test
        if: steps.diff.outputs.needed == 'true'
        id: test
        run: |
          set +e
          OUTPUT=$(planemo test \
            --dependency_resolvers_config_file dependency_resolvers_conf.xml \
            --test_timeout 120 \
            metagraph_search.xml 2>&1)
          EXIT_CODE=$?

          echo "$OUTPUT" > /tmp/test_output.txt

          # Extract the summary line (e.g. "1 passed, 0 failed")
          SUMMARY=$(echo "$OUTPUT" | grep -E "passed|failed" | tail -3)

          if [ $EXIT_CODE -eq 0 ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
            echo "badge=✅ Tests passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "badge=❌ Tests failed" >> "$GITHUB_OUTPUT"
          fi

          # Store multiline summary safely
          {
            echo "summary<<EOF"
            echo "$SUMMARY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          # Store last 40 lines of output for the PR body
          {
            echo "log<<EOF"
            echo "$OUTPUT" | tail -40
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Open Pull Request
        if: steps.diff.outputs.needed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: update/requests-${{ steps.latest.outputs.requests }}
          title: "chore(deps): bump requests ${{ steps.current.outputs.requests }} → ${{ steps.latest.outputs.requests }}"
          body: |
            Automated monthly dependency check found a new release.

            | Package | Old | New |
            |---------|-----|-----|
            | requests | `${{ steps.current.outputs.requests }}` | `${{ steps.latest.outputs.requests }}` |

            ---

            ## Pre-merge test result

            ${{ steps.test.outputs.badge }}

            ```
            ${{ steps.test.outputs.summary }}
            ```

            <details>
            <summary>Full planemo test output</summary>

            ```
            ${{ steps.test.outputs.log }}
            ```

            </details>

            ---

            ${{ steps.test.outputs.status == 'passed' && '**✅ Safe to merge** — tests pass with the new version.' || '**❌ Do not merge** — tests failed. Review the output above before proceeding.' }}

            ### Remaining checklist
            - [ ] Review the [requests changelog](https://requests.readthedocs.io/en/latest/community/updates/) for breaking changes
            - [ ] After merging, publish to ToolShed:
              ```bash
              planemo shed_update --shed_target toolshed
              ```
          commit-message: "chore(deps): bump requests to ${{ steps.latest.outputs.requests }}"
          labels: dependencies
